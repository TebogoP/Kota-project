  <section id="filter-add">
    <button [routerLink]="['/new-edit']">Add new product</button>
    <button  *ngIf="productList.length ===0" (click)="loadFromStorage()">Load Products</button>
    <form>
      <input type="text" placeholder="Filter by name">
      <button class ="primary" type="button">Search</button>
    </form>
  </section>

  <section class="results">
    <app-products *ngFor="let product of productList" [productsInterface]="product" (delete)="deleteProduct($event)">  >
    </app-products>
  </section>
